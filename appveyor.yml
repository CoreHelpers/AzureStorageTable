version: 4.0.{build}
pull_requests:
  do_not_increment_build_number: true

before_build:
  - nuget restore

build_script:
- cmd: >-
    dotnet restore CoreHelpers.WindowsAzure.Storage.Table\CoreHelpers.WindowsAzure.Storage.Table.csproj

    dotnet build -c Release CoreHelpers.WindowsAzure.Storage.Table\CoreHelpers.WindowsAzure.Storage.Table.csproj

    nuget pack CoreHelpers.WindowsAzure.Storage.Table.nuspec -Version %APPVEYOR_BUILD_VERSION% -Verbosity detailed
    
    dotnet restore CoreHelpers.WindowsAzure.Storage.Table.Abstractions\CoreHelpers.WindowsAzure.Storage.Table.Abstractions.csproj

    dotnet build -c Release CoreHelpers.WindowsAzure.Storage.Table.Abstractions\CoreHelpers.WindowsAzure.Storage.Table.Abstractions.csproj

    nuget pack CoreHelpers.WindowsAzure.Storage.Table.Abstractions.nuspec -Version %APPVEYOR_BUILD_VERSION% -Verbosity detailed
artifacts:
- path: '*.nupkg'
  name: NuGetPackage
